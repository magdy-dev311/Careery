<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Careery - Your Career Path</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{--brand:#6336c7;--brand-light:#8b5cf6;--brand-glow:rgba(99,54,199,0.15);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:#f8f7ff;color:#1a1033;}
    h1,h2,h3,.syne{font-family:'Syne',sans-serif;}
    a{text-decoration:none;}

    .bg-blob{position:fixed;top:-150px;right:-150px;width:500px;height:500px;
      background:radial-gradient(circle,rgba(139,92,246,0.1) 0%,transparent 70%);
      border-radius:50%;pointer-events:none;z-index:0;animation:bpulse 8s ease-in-out infinite;}
    @keyframes bpulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
    @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
    @keyframes unlock{0%{transform:scale(1);}40%{transform:scale(1.06);}100%{transform:scale(1);}}
    @keyframes popIn{0%{opacity:0;transform:scale(0.92);}100%{opacity:1;transform:scale(1);}}

    .timeline-line{position:absolute;left:50%;top:0;bottom:0;width:3px;transform:translateX(-50%);
      background:linear-gradient(180deg,#6336c7 0%,#e5e7eb 0%);border-radius:99px;z-index:0;
      transition:background 0.8s ease;}

    .step-card{background:#fff;border:1.5px solid #ede9fe;border-radius:24px;padding:28px;
      box-shadow:0 4px 24px rgba(99,54,199,0.06);position:relative;z-index:1;transition:all 0.35s;}
    .step-card-done{background:linear-gradient(135deg,#f5f3ff,#ede9fe);}
    .step-card-active{border-color:var(--brand);box-shadow:0 8px 40px rgba(99,54,199,0.18);}
    .step-card-locked{background:#f9f9fb;border:2px dashed #e5e7eb;opacity:0.65;}
    .step-card-unlocked{animation:unlock 0.5s ease;}

    .center-dot{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
      width:28px;height:28px;border-radius:50%;z-index:2;display:flex;align-items:center;
      justify-content:center;border:3px solid #fff;}
    .center-dot-done{background:linear-gradient(135deg,#6336c7,#8b5cf6);box-shadow:0 2px 12px rgba(99,54,199,0.35);}
    .center-dot-active{background:linear-gradient(135deg,#6336c7,#8b5cf6);animation:float 3s ease-in-out infinite;box-shadow:0 2px 16px rgba(99,54,199,0.4);}
    .center-dot-locked{background:#e5e7eb;}

    .btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand-light));color:#fff;font-weight:700;
      border-radius:14px;padding:12px 28px;cursor:pointer;transition:all 0.2s;font-family:'Syne',sans-serif;
      box-shadow:0 4px 20px var(--brand-glow);border:none;font-size:14px;}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px var(--brand-glow);}
    .btn-primary:disabled{opacity:0.45;cursor:not-allowed;transform:none;}

    .btn-outline{background:transparent;border:1.5px solid var(--brand);color:var(--brand);
      font-weight:600;border-radius:12px;padding:9px 20px;cursor:pointer;transition:all 0.2s;
      font-family:'Syne',sans-serif;font-size:13px;}
    .btn-outline:hover{background:#f0eeff;}

    .progress-fill{height:100%;border-radius:99px;
      background:linear-gradient(90deg,var(--brand),var(--brand-light));transition:width 0.8s cubic-bezier(.4,0,.2,1);}

    .video-thumb{border-radius:14px;overflow:hidden;position:relative;aspect-ratio:16/9;
      background:#0f0a1e;cursor:pointer;margin-bottom:16px;}
    .play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
    .play-circle{width:44px;height:44px;background:rgba(255,255,255,0.2);backdrop-filter:blur(8px);
      border-radius:50%;border:1.5px solid rgba(255,255,255,0.4);display:flex;align-items:center;
      justify-content:center;transition:all 0.2s;}
    .play-circle:hover{transform:scale(1.1);background:rgba(255,255,255,0.3);}

    .input-field{width:100%;border:1.5px solid #e5e7eb;border-radius:12px;padding:11px 14px;
      font-family:'DM Sans',sans-serif;font-size:14px;color:#1a1033;outline:none;
      transition:border-color 0.2s;}
    .input-field:focus{border-color:var(--brand);}
    .input-field.saved{border-color:#16a34a;background:#f0fdf4;}

    .platform-card{display:flex;align-items:center;gap:14px;background:#fff;border:1.5px solid #ede9fe;
      border-radius:16px;padding:16px 20px;transition:all 0.2s;text-decoration:none;color:#1a1033;}
    .platform-card:hover{border-color:var(--brand);box-shadow:0 4px 20px rgba(99,54,199,0.1);transform:translateY(-2px);}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(15,10,40,0.85);
      backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px;
      animation:fadeUp 0.2s ease;}

    /* Video picker modal */
    .video-picker-overlay{position:fixed;inset:0;z-index:1000;background:rgba(15,10,40,0.88);
      backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;
      animation:fadeUp 0.25s ease;}
    .video-picker-box{background:#fff;border-radius:28px;padding:32px;max-width:520px;width:100%;
      box-shadow:0 40px 80px rgba(99,54,199,0.3);animation:popIn 0.3s ease;}
    .video-option{display:flex;align-items:center;gap:16px;padding:16px 20px;border-radius:16px;
      border:1.5px solid #ede9fe;cursor:pointer;transition:all 0.2s;margin-bottom:10px;background:#fff;}
    .video-option:hover{border-color:var(--brand);background:#f5f3ff;transform:translateY(-1px);}
    .video-option.selected{border-color:var(--brand);background:linear-gradient(135deg,#f5f3ff,#ede9fe);
      box-shadow:0 4px 20px rgba(99,54,199,0.15);}

    /* Learn section */
    .learn-card{display:flex;align-items:center;gap:14px;background:#fff;border:1.5px solid #ede9fe;
      border-radius:16px;padding:16px 20px;transition:all 0.2s;text-decoration:none;color:#1a1033;}
    .learn-card:hover{border-color:var(--brand);box-shadow:0 4px 20px rgba(99,54,199,0.1);transform:translateY(-2px);}

    @media(max-width:640px){
      .timeline-line{display:none;}
      .center-dot{display:none;}
      .step-left,.step-right{padding:0!important;justify-content:center!important;}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;

const CV_TEMPLATE_LINK = "https://docs.google.com/document/d/1k3giiKFAHtupz46mVsdydaWdnzt1ZJ8c5oEjGDsAD0E/copy";

// LinkedIn videos — user picks ONE
const LINKEDIN_VIDEOS = [
  {
    id: "ghareeb",
    name: "غريب الشيخ",
    desc: "LinkedIn Growth & Personal Branding",
    thumb: "🎓",
    color: "#6336c7",
    url: "https://youtu.be/7JysIkTyccs?si=NqDl2uHtG5nLcOtc",
  },
  {
    id: "sebaei",
    name: "أحمد السباعي",
    desc: "LinkedIn للفريلانسرز والمحترفين",
    thumb: "💼",
    color: "#0e76a8",
    url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
  },
  {
    id: "other1",
    name: "محمد المصري",
    desc: "كيف تبني حضوراً قوياً على LinkedIn",
    thumb: "🚀",
    color: "#16a34a",
    url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
  },
];

const LEARN_PLATFORMS = [
  { name:"Khamsat",       icon:"5️⃣", color:"#16a34a", url:"https://youtube.com/playlist?list=PLu3BfVDe4WGFudnAGTpxY5FyrM__78DOV&si=feZEQRcNPv4F6_Xi",       desc:"Sell services starting from $5" },
  { name:"Mostaql Blog",  icon:"🧑‍💻", color:"#1d4ed8", url:"https://youtube.com/playlist?list=PLu3BfVDe4WGEdql_NOoIQYxhE1SJgjoJz&si=UWUe3itCHiRSsbQ2", desc:"Largest Arabic freelance platform" },
  { name:"Upwork",       icon:"🌍", color:"#14a800", url:"https://youtube.com/playlist?list=PLu3BfVDe4WGHIDnf9yH3KjF9YJdXGrV_S&si=mYFzYEqPB2XFQsmA",       desc:"Global freelance & remote work" },
];

const FREELANCE_PLATFORMS = [
  { name:"Mostaql",    name_ar:"مستقل",    icon:"🧑‍💻", color:"#1d4ed8", url:"https://mostaql.com",    desc:"Largest Arabic freelance platform" },
  { name:"Khamsat",    name_ar:"خمسات",    icon:"5️⃣",  color:"#16a34a", url:"https://khamsat.com",     desc:"Sell services starting from $5" },
  { name:"Upwork",     name_ar:"أبورك",    icon:"🌍",  color:"#14a800", url:"https://upwork.com",       desc:"Global freelance & remote work" },
  { name:"Fiverr",     name_ar:"فايفر",    icon:"🟢",  color:"#1dbf73", url:"https://fiverr.com",       desc:"Quick gigs, global clients" },
  { name:"Freelancer", name_ar:"فريلانسر", icon:"🔵",  color:"#29b2fe", url:"https://freelancer.com",   desc:"Bid on projects worldwide" },
];

// ── Video Watch Modal ───────────────────────────────────────────
function VideoModal({url, onClose}){
  useEffect(()=>{
    const h=(e)=>{if(e.key==="Escape")onClose();};
    document.addEventListener("keydown",h);
    return()=>document.removeEventListener("keydown",h);
  },[]);
  // Convert youtube watch URL to embed
  const toEmbed = (u)=>{
    try {
      const yt = u.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
      if(yt) return `https://www.youtube.com/embed/${yt[1]}?autoplay=1`;
    } catch(e){}
    return u;
  };
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:860,borderRadius:20,overflow:"hidden",
        boxShadow:"0 32px 80px rgba(99,54,199,0.4)",position:"relative"}}>
        <button onClick={onClose} style={{position:"absolute",top:10,right:10,zIndex:10,width:34,height:34,
          borderRadius:"50%",border:"none",background:"rgba(0,0,0,0.6)",color:"#fff",fontSize:18,cursor:"pointer",
          display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        <iframe src={toEmbed(url)} style={{width:"100%",aspectRatio:"16/9",display:"block",border:"none"}}
          allow="autoplay;fullscreen;encrypted-media;picture-in-picture" allowFullScreen frameBorder="0"/>
      </div>
    </div>
  );
}

// ── LinkedIn Video Picker Modal ─────────────────────────────────
function VideoPickerModal({onSelect, onClose}){
  const [sel, setSel] = useState(null);
  useEffect(()=>{
    const h=(e)=>{if(e.key==="Escape")onClose();};
    document.addEventListener("keydown",h);
    return()=>document.removeEventListener("keydown",h);
  },[]);
  return(
    <div className="video-picker-overlay" onClick={onClose}>
      <div className="video-picker-box" onClick={e=>e.stopPropagation()}>
        <div style={{marginBottom:24}}>
          <h3 className="syne" style={{fontSize:20,fontWeight:800,marginBottom:6}}>Pick a LinkedIn Video</h3>
          <p style={{fontSize:13,color:"#6b7280"}}>Choose one instructor and watch their video to optimize your profile</p>
        </div>
        {LINKEDIN_VIDEOS.map(v=>(
          <div key={v.id} className={`video-option ${sel===v.id?"selected":""}`} onClick={()=>setSel(v.id)}>
            <div style={{width:44,height:44,borderRadius:12,background:`${v.color}18`,display:"flex",
              alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>
              {v.thumb}
            </div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:2}}>{v.name}</div>
              <div style={{fontSize:12,color:"#9ca3af"}}>{v.desc}</div>
            </div>
            <div style={{width:20,height:20,borderRadius:"50%",border:`2px solid ${sel===v.id?"var(--brand)":"#e5e7eb"}`,
              background:sel===v.id?"var(--brand)":"#fff",display:"flex",alignItems:"center",
              justifyContent:"center",flexShrink:0}}>
              {sel===v.id && <div style={{width:8,height:8,borderRadius:"50%",background:"#fff"}}/>}
            </div>
          </div>
        ))}
        <div style={{display:"flex",gap:10,marginTop:20}}>
          <button className="btn-outline" onClick={onClose} style={{flex:1}}>Cancel</button>
          <button className="btn-primary" disabled={!sel} onClick={()=>{
            const v = LINKEDIN_VIDEOS.find(x=>x.id===sel);
            onSelect(v);
          }} style={{flex:2}}>
            Watch Video →
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Main App ────────────────────────────────────────────────────
function App(){
  const [completed, setCompleted]         = useState({roadmap:false, cv:false, linkedin:false});
  const [cvLink, setCvLink]               = useState("");
  const [cvSaved, setCvSaved]             = useState(false);
  const [videoModal, setVideoModal]       = useState(null);   // url string
  const [showPicker, setShowPicker]       = useState(false);  // linkedin picker
  const [linkedinVideoUrl, setLinkedinVideoUrl] = useState(null);

  const cvUnlocked        = completed.roadmap;
  const linkedinUnlocked  = completed.roadmap && completed.cv;
  const freelanceUnlocked = completed.roadmap && completed.cv && completed.linkedin;

  const doneCount = [completed.roadmap, completed.cv, completed.linkedin].filter(Boolean).length;
  const progress  = Math.round((doneCount / 4) * 100);
  const linePercent = doneCount===0?0:doneCount===1?25:doneCount===2?55:doneCount===3?80:100;

  function markDone(step){ setCompleted(p=>({...p,[step]:true})); }

  // CV auto-complete on Save
  function handleCvSave(){
    if(!cvLink.trim()) return;
    setCvSaved(true);
    setTimeout(()=>markDone("cv"), 400);
  }

  // LinkedIn picker select → open video → mark done
  function handleLinkedinSelect(video){
    setShowPicker(false);
    setLinkedinVideoUrl(video.url);
    setVideoModal(video.url);
    // Mark done after they open the video
    setTimeout(()=>markDone("linkedin"), 800);
  }

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <div className="bg-blob"/>
      {videoModal && <VideoModal url={videoModal} onClose={()=>setVideoModal(null)}/>}
      {showPicker && <VideoPickerModal onSelect={handleLinkedinSelect} onClose={()=>setShowPicker(false)}/>}

      {/* Header */}
      <header style={{background:"#fff",borderBottom:"1px solid #f0eefe",position:"sticky",top:0,zIndex:50}}>
        <div style={{maxWidth:1100,margin:"0 auto",padding:"16px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <a href="index.html" className="syne" style={{fontSize:22,fontWeight:800,color:"var(--brand)"}}>Careery</a>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#6336c7,#8b5cf6)",
              display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:12}}>MZ</div>
          </div>
        </div>
      </header>

      <main style={{maxWidth:800,margin:"0 auto",padding:"48px 20px 80px",width:"100%",position:"relative",zIndex:1}}>

        <div style={{textAlign:"center",marginBottom:40}}>
          <h1 className="syne" style={{fontSize:"clamp(26px,5vw,42px)",fontWeight:800,marginBottom:10}}>Your Career Path</h1>
          <p style={{color:"#6b7280",fontSize:15}}>Complete each step to unlock your freelancing journey.</p>
        </div>

        {/* Progress Bar */}
        <div style={{marginBottom:64,maxWidth:500,margin:"0 auto 64px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <span style={{fontSize:11,fontWeight:700,color:"var(--brand)",textTransform:"uppercase",letterSpacing:"0.05em"}}>Progress</span>
            <span style={{fontSize:14,fontWeight:700,color:"var(--brand)"}}>{progress}%</span>
          </div>
          <div style={{height:10,borderRadius:99,background:"#e5e7eb",overflow:"hidden"}}>
            <div className="progress-fill" style={{width:`${progress}%`}}/>
          </div>
          {progress===100 && (
            <div style={{marginTop:12,textAlign:"center",fontSize:13,fontWeight:700,color:"#16a34a"}}>
              🎉 You've completed your career path!
            </div>
          )}
        </div>

        {/* Timeline */}
        <div style={{position:"relative",paddingBottom:48}}>
          <div className="timeline-line" style={{
            background:`linear-gradient(180deg, #6336c7 ${linePercent}%, #e5e7eb ${linePercent}%)`
          }}/>

          {/* ── STEP 0: Finish Roadmap ── */}
          <div className="step-left" style={{position:"relative",display:"flex",justifyContent:"flex-start",marginBottom:64,paddingRight:"52%"}}>
            <div className={`step-card ${completed.roadmap?"step-card-done":"step-card-active"}`} style={{width:"100%"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <span style={{fontSize:10,fontWeight:700,color:"var(--brand)",textTransform:"uppercase",letterSpacing:"0.06em"}}>
                  Step 1 {completed.roadmap?"• Done":"• Active"}
                </span>
                {completed.roadmap
                  ? <div style={{width:22,height:22,borderRadius:"50%",background:"#c4b5fd",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <svg width="12" height="12" fill="#6336c7" viewBox="0 0 20 20"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd"/></svg>
                    </div>
                  : <span style={{fontSize:16}}>🗺️</span>
                }
              </div>
              <h3 className="syne" style={{fontSize:18,fontWeight:700,marginBottom:8}}>
                Complete Your Roadmap
              </h3>
              <p style={{color:"#6b7280",fontSize:13,lineHeight:1.6,marginBottom:16}}>
                Finish all lessons in your learning roadmap before unlocking your career tools.
              </p>
              {completed.roadmap
                ? <a href="roadmap.html" className="btn-outline" style={{fontSize:13}}>Review Roadmap</a>
                : <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                    <a href="roadmap.html" className="btn-primary">Go to Roadmap →</a>
                    <button className="btn-outline" onClick={()=>markDone("roadmap")}>Mark as Done ✓</button>
                  </div>
              }
            </div>
            <div className={`center-dot ${completed.roadmap?"center-dot-done":"center-dot-active"}`} style={{fontSize:12,color:"#fff"}}>
              {completed.roadmap?"✓":"▶"}
            </div>
          </div>

          {/* ── STEP 1: Build Your CV ── */}
          <div className="step-right" style={{position:"relative",display:"flex",justifyContent:"flex-end",marginBottom:64,paddingLeft:"52%"}}>
            <div className={`center-dot ${completed.cv?"center-dot-done":cvUnlocked?"center-dot-active":"center-dot-locked"}`}
              style={{fontSize:cvUnlocked&&!completed.cv?13:12,color:cvUnlocked?"#fff":"#d1d5db"}}>
              {completed.cv?"✓":cvUnlocked?"▶":"🔒"}
            </div>
            <div className={`step-card ${completed.cv?"step-card-done":cvUnlocked?"step-card-active":"step-card-locked"} ${cvUnlocked&&!completed.cv?"step-card-unlocked":""}`}
              style={{width:"100%"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <span style={{fontSize:10,fontWeight:700,color:cvUnlocked?"var(--brand)":"#9ca3af",textTransform:"uppercase",letterSpacing:"0.06em"}}>
                  Step 2 {completed.cv?"• Done":cvUnlocked?"• Active":"• Locked"}
                </span>
                {completed.cv
                  ? <div style={{width:22,height:22,borderRadius:"50%",background:"#c4b5fd",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <svg width="12" height="12" fill="#6336c7" viewBox="0 0 20 20"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd"/></svg>
                    </div>
                  : <span style={{fontSize:16}}>{cvUnlocked?"📄":"🔒"}</span>
                }
              </div>
              <h3 className="syne" style={{fontSize:18,fontWeight:700,marginBottom:8,color:cvUnlocked?"#1a1033":"#9ca3af"}}>
                Build Your CV
              </h3>
              <p style={{color:cvUnlocked?"#6b7280":"#9ca3af",fontSize:13,lineHeight:1.6,marginBottom:cvUnlocked?16:8}}>
                Create a professional CV using our template, then paste the link below.
              </p>
              {!cvUnlocked && <p style={{fontSize:11,color:"#ef4444",fontStyle:"italic"}}>Complete Step 1 to unlock</p>}
              {cvUnlocked && (
                <>
                  {!completed.cv && (
                    <a href={CV_TEMPLATE_LINK} target="_blank" rel="noreferrer" className="btn-primary"
                      style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,width:"fit-content"}}>
                      📄 Open CV Template
                    </a>
                  )}
                  <div style={{marginBottom:14}}>
                    <label style={{fontSize:12,fontWeight:600,color:"#6b7280",display:"block",marginBottom:6}}>
                      Paste your CV link here
                    </label>
                    <div style={{display:"flex",gap:8}}>
                      <input
                        className={`input-field ${cvSaved?"saved":""}`}
                        placeholder="https://..."
                        value={cvLink}
                        onChange={e=>{setCvLink(e.target.value);setCvSaved(false);}}
                        disabled={completed.cv}
                        style={{flex:1}}
                      />
                      {!completed.cv && (
                        <button className="btn-outline" onClick={handleCvSave} disabled={!cvLink.trim()}>
                          Save ✓
                        </button>
                      )}
                    </div>
                    {cvSaved && !completed.cv && (
                      <p style={{fontSize:11,color:"#16a34a",fontWeight:600,marginTop:6}}>✅ Saved! Unlocking next step…</p>
                    )}
                    {cvLink && completed.cv && (
                      <a href={cvLink} target="_blank" rel="noreferrer"
                        style={{fontSize:12,color:"var(--brand)",fontWeight:600,marginTop:6,display:"block"}}>
                        👁 Preview CV ↗
                      </a>
                    )}
                  </div>
                </>
              )}
            </div>
          </div>

          {/* ── STEP 2: Optimize LinkedIn ── */}
          <div className="step-left" style={{position:"relative",display:"flex",justifyContent:"flex-start",marginBottom:64,paddingRight:"52%"}}>
            <div className={`step-card ${completed.linkedin?"step-card-done":linkedinUnlocked?"step-card-active":"step-card-locked"} ${linkedinUnlocked&&!completed.linkedin?"step-card-unlocked":""}`}
              style={{width:"100%"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <span style={{fontSize:10,fontWeight:700,color:linkedinUnlocked?"var(--brand)":"#9ca3af",textTransform:"uppercase",letterSpacing:"0.06em"}}>
                  Step 3 {completed.linkedin?"• Done":linkedinUnlocked?"• Active":"• Locked"}
                </span>
                {completed.linkedin
                  ? <div style={{width:22,height:22,borderRadius:"50%",background:"#c4b5fd",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <svg width="12" height="12" fill="#6336c7" viewBox="0 0 20 20"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd"/></svg>
                    </div>
                  : <span style={{fontSize:16}}>{linkedinUnlocked?"💼":"🔒"}</span>
                }
              </div>
              <h3 className="syne" style={{fontSize:18,fontWeight:700,marginBottom:8,color:linkedinUnlocked?"#1a1033":"#9ca3af"}}>
                Optimize Your LinkedIn
              </h3>
              <p style={{color:linkedinUnlocked?"#6b7280":"#9ca3af",fontSize:13,lineHeight:1.6,marginBottom:linkedinUnlocked?16:8}}>
                Learn the secret hacks to get recruiters and clients sliding into your DMs daily.
              </p>
              {!linkedinUnlocked && <p style={{fontSize:11,color:"#ef4444",fontStyle:"italic"}}>Complete Step 2 to unlock</p>}
              {linkedinUnlocked && (
                <>
                  {/* Show chosen video thumbnail or picker button */}
                  {linkedinVideoUrl ? (
                    <div style={{marginBottom:14}}>
                      <div className="video-thumb" onClick={()=>setVideoModal(linkedinVideoUrl)}>
                        <div style={{position:"absolute",inset:0,background:"linear-gradient(135deg,#1e1b4b,#312e81)",opacity:0.9}}/>
                        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8}}>
                          <div className="play-circle">
                            <svg width="18" height="18" fill="#fff" viewBox="0 0 24 24" style={{marginLeft:2}}><path d="M8 5v14l11-7z"/></svg>
                          </div>
                          <span style={{color:"rgba(255,255,255,0.8)",fontSize:12,fontWeight:600}}>LinkedIn Optimization Guide</span>
                        </div>
                      </div>
                      <p style={{fontSize:11,color:"#16a34a",fontWeight:600}}>✅ Video unlocked! Step completed.</p>
                    </div>
                  ) : (
                    <div style={{marginBottom:16}}>
                      <button className="btn-primary" onClick={()=>setShowPicker(true)}
                        style={{display:"flex",alignItems:"center",gap:8}}>
                        🎬 Pick a Video &amp; Watch
                      </button>
                      <p style={{fontSize:11,color:"#9ca3af",marginTop:8}}>Watch the video to auto-complete this step</p>
                    </div>
                  )}
                  <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
                    <a href="https://linkedin.com" target='_blank' className="btn-outline">Open LinkedIn →</a>
                  </div>
                </>
              )}
            </div>
            <div className={`center-dot ${completed.linkedin?"center-dot-done":linkedinUnlocked?"center-dot-active":"center-dot-locked"}`}
              style={{fontSize:12,color:linkedinUnlocked?"#fff":"#d1d5db"}}>
              {completed.linkedin?"✓":linkedinUnlocked?"▶":"🔒"}
            </div>
          </div>

          {/* ── STEP 3: Learn Freelancing ── */}
          <div className="step-right" style={{position:"relative",display:"flex",justifyContent:"flex-end",marginBottom:64,paddingLeft:"52%"}}>
            <div className={`center-dot ${freelanceUnlocked?"center-dot-active":"center-dot-locked"}`}
              style={{fontSize:12,color:freelanceUnlocked?"#fff":"#d1d5db"}}>
              {freelanceUnlocked?"▶":"🔒"}
            </div>
            <div className={`step-card ${freelanceUnlocked?"step-card-active":"step-card-locked"} ${freelanceUnlocked?"step-card-unlocked":""}`}
              style={{width:"100%"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <span style={{fontSize:10,fontWeight:700,color:freelanceUnlocked?"var(--brand)":"#9ca3af",textTransform:"uppercase",letterSpacing:"0.06em"}}>
                  Step 4 {freelanceUnlocked?"• Unlocked 🎉":"• Locked"}
                </span>
                <span style={{fontSize:16}}>{freelanceUnlocked?"📖":"🔒"}</span>
              </div>
              <h3 className="syne" style={{fontSize:18,fontWeight:700,marginBottom:8,color:freelanceUnlocked?"#1a1033":"#9ca3af"}}>
                Learn Freelancing
              </h3>
              <p style={{color:freelanceUnlocked?"#6b7280":"#9ca3af",fontSize:13,lineHeight:1.6,marginBottom:freelanceUnlocked?20:8}}>
                {freelanceUnlocked
                  ? "Explore the best Arabic and global resources before landing your first client."
                  : "Complete all previous steps to unlock learning resources."}
              </p>
              {!freelanceUnlocked && <p style={{fontSize:11,color:"#ef4444",fontStyle:"italic"}}>Complete all steps to unlock</p>}
              {freelanceUnlocked && (
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {LEARN_PLATFORMS.map(p=>(
                    <a key={p.name} href={p.url} target="_blank" rel="noreferrer" className="learn-card">
                      <div style={{width:40,height:40,borderRadius:12,background:`${p.color}18`,
                        display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>
                        {p.icon}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,fontSize:14,marginBottom:2}}>{p.name}</div>
                        <span style={{fontSize:12,color:"#9ca3af"}}>{p.desc}</span>
                      </div>
                      <svg width="16" height="16" fill="none" stroke="#9ca3af" viewBox="0 0 24 24">
                        <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                      </svg>
                    </a>
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* ── STEP 4: Start Freelancing ── */}
          <div className="step-left" style={{position:"relative",display:"flex",justifyContent:"flex-start",paddingRight:"52%"}}>
            <div className={`center-dot ${freelanceUnlocked?"center-dot-active":"center-dot-locked"}`}
              style={{fontSize:12,color:freelanceUnlocked?"#fff":"#d1d5db"}}>
              {freelanceUnlocked?"▶":"🔒"}
            </div>
            <div className={`step-card ${freelanceUnlocked?"step-card-active":"step-card-locked"}`}
              style={{width:"100%"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <span style={{fontSize:10,fontWeight:700,color:freelanceUnlocked?"var(--brand)":"#9ca3af",textTransform:"uppercase",letterSpacing:"0.06em"}}>
                  Step 5 {freelanceUnlocked?"• You're Ready 🚀":"• Locked"}
                </span>
                <span style={{fontSize:16}}>{freelanceUnlocked?"🚀":"🔒"}</span>
              </div>
              <h3 className="syne" style={{fontSize:18,fontWeight:700,marginBottom:8,color:freelanceUnlocked?"#1a1033":"#9ca3af"}}>
                Start Freelancing
              </h3>
              <p style={{color:freelanceUnlocked?"#6b7280":"#9ca3af",fontSize:13,lineHeight:1.6,marginBottom:freelanceUnlocked?20:8}}>
                {freelanceUnlocked
                  ? "You're ready! Choose a platform and land your first client."
                  : "Complete all previous steps to unlock freelancing platforms."}
              </p>
              {!freelanceUnlocked && <p style={{fontSize:11,color:"#ef4444",fontStyle:"italic"}}>Complete all steps to unlock</p>}
              {freelanceUnlocked && (
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {FREELANCE_PLATFORMS.map(p=>(
                    <a key={p.name} href={p.url} target="_blank" rel="noreferrer" className="platform-card">
                      <div style={{width:40,height:40,borderRadius:12,background:`${p.color}18`,
                        display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>
                        {p.icon}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                          <span style={{fontWeight:700,fontSize:14}}>{p.name}</span>
                          <span style={{fontSize:12,color:"#9ca3af"}}>({p.name_ar})</span>
                        </div>
                        <span style={{fontSize:12,color:"#9ca3af"}}>{p.desc}</span>
                      </div>
                      <svg width="16" height="16" fill="none" stroke="#9ca3af" viewBox="0 0 24 24">
                        <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                      </svg>
                    </a>
                  ))}
                </div>
              )}
            </div>
          </div>

        </div>{/* end timeline */}
      </main>

      <footer style={{background:"#fff",borderTop:"1px solid #f0eefe",padding:"24px"}}>
        <div style={{maxWidth:1100,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
          <span className="syne" style={{fontSize:16,fontWeight:800}}>Careery</span>
          <span style={{fontSize:13,color:"#9ca3af"}}>© 2026 Careery | All rights reserved.</span>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
