<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Careery - Your Career Path</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --brand: #6336c7;
            --brand-light: #8b5cf6;
            --brand-dark: #4c1d95;
            --brand-glow: rgba(99, 54, 199, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f8f7ff;
            color: #1a1033;
        }

        h1,
        h2,
        h3,
        .syne {
            font-family: 'Syne', sans-serif;
        }

        a {
            text-decoration: none;
        }

        .bg-blob {
            position: fixed;
            top: -150px;
            right: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .timeline-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 3px;
            transform: translateX(-50%);
            background: linear-gradient(180deg, #6336c7 33%, #e5e7eb 33%);
            border-radius: 99px;
            z-index: 0;
        }

        .step-card {
            background: #fff;
            border: 1.5px solid #ede9fe;
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 4px 24px rgba(99, 54, 199, 0.06);
            position: relative;
            z-index: 1;
        }

        .step-card-done {
            background: linear-gradient(135deg, #f5f3ff, #ede9fe);
        }

        .step-card-active {
            border-color: var(--brand);
            box-shadow: 0 8px 40px rgba(99, 54, 199, 0.18);
        }

        .step-card-locked {
            background: #f9f9fb;
            border: 2px dashed #e5e7eb;
            opacity: 0.65;
        }

        .center-dot {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #fff;
        }

        .center-dot-done {
            background: linear-gradient(135deg, #6336c7, #8b5cf6);
            box-shadow: 0 2px 12px rgba(99, 54, 199, 0.35);
        }

        .center-dot-active {
            background: linear-gradient(135deg, #6336c7, #8b5cf6);
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 2px 16px rgba(99, 54, 199, 0.4);
        }

        .center-dot-locked {
            background: #e5e7eb;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--brand), var(--brand-light));
            color: #fff;
            font-weight: 700;
            border-radius: 14px;
            padding: 12px 28px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Syne', sans-serif;
            box-shadow: 0 4px 20px var(--brand-glow);
            border: none;
            font-size: 14px;
            display: inline-block;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 28px var(--brand-glow);
        }

        .btn-outline {
            background: #fff;
            border: 1.5px solid #e5e7eb;
            color: #374151;
            font-weight: 600;
            border-radius: 14px;
            padding: 12px 28px;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            display: inline-block;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            border-color: var(--brand);
            color: var(--brand);
        }

        .progress-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--brand), var(--brand-light));
            transition: width 0.6s ease;
        }

        .video-thumb {
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16/9;
            background: #0f0a1e;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-circle {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            cursor: pointer;
        }

        .play-circle:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

                                        <img
                                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuAZ-4rgX-csT5D7WqbbPMSOy5Hif3E5RwgsZjW3jv9o8DY8i-2i1gSer4mByugpfmiNUXOzAB29zH3oHovxvcLpdEAPgic7j95P5idsvvxJw4O2GxO1qNjYAt6vH0qiCZbcXj_kItng6HyDCGzr7v7zveS0xzAwJ_LKSCjwAn7gLRMxlhDMzrxjDHRjhHzieLLbQ6EsxJKVKAFapgdqV09fNsg3q6a-z-hFk4Cix0gr9BCFvyJ6CBLIkij4wqjsQVtgv9u5uXKhh6A"

                                            style={{ width: '100%', height: '100%', objectFit: 'cover', opacity: 0.65, position: 'absolute', inset: 0 }}
                                            onError={e => { e.target.style.display = 'none' }}
                                        />
                                        <div className="play-overlay">
                                            <div className="play-circle">
                                                <svg width="18" height="18" fill="#fff" viewBox="0 0 24 24" style={{ marginLeft: 2 }}><path d="M8 5v14l11-7z" /></svg>
                                            </div>
                                        </div>
                                    </div>
                                    <a href="recommendation.html" className="btn-primary" style={{ width: '100%', textAlign: 'center', display: 'block', borderRadius: 12 }}>Start Optimization</a>
                                </div>
                            </div>

                            {/* Step 3 — Left, Locked */}
                            <div style={{ position: 'relative', display: 'flex', justifyContent: 'flex-start', paddingRight: '52%' }}>
                                <div className="step-card step-card-locked" style={{ width: '100%' }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 12 }}>
                                        <span style={{ fontSize: 10, fontWeight: 700, color: '#9ca3af', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Step 3 • Locked</span>
                                        <span style={{ fontSize: 16 }}>🔒</span>
                                    </div>
                                    <h3 className="syne" style={{ fontSize: 18, fontWeight: 700, marginBottom: 8, color: '#9ca3af' }}>Start Freelancing</h3>
                                    <p style={{ color: '#9ca3af', fontSize: 13, lineHeight: 1.6, marginBottom: 8 }}>Unlock your first contracts and set up your billing profile to start earning.</p>
                                    <p style={{ fontSize: 11, color: '#ef4444', fontStyle: 'italic' }}>Complete previous step to unlock</p>
                                </div>
                                <div className="center-dot center-dot-locked" style={{ color: '#d1d5db', fontSize: 14 }}>🔒</div>
                            </div>
                        </div>
                    </main>

                    <footer style={{ background: '#fff', borderTop: '1px solid #f0eefe', padding: '24px' }}>
                        <div style={{ maxWidth: 1100, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 }}>
                            <span className="syne" style={{ fontSize: 16, fontWeight: 800 }}>Careery</span>
                            <span style={{ fontSize: 13, color: '#9ca3af' }}>© 2026 Careery | All rights reserved.</span>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
