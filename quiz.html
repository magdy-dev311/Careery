<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Careery - Career Quiz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="app.js"></script>
  <style>
    :root{--brand:#6336c7;--brand-light:#8b5cf6;--brand-glow:rgba(99,54,199,0.18);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:#f0eefc;min-height:100vh;color:#1a1033;}
    .syne{font-family:'Syne',sans-serif;}
    .card{background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(99,54,199,0.1);padding:32px;}
    .option-card{transition:all .2s;border:2px solid #e5e7eb;background:#fff;cursor:pointer;border-radius:14px;padding:16px;margin-bottom:12px;}
    .option-card:hover{border-color:var(--brand);}
    .option-card.selected{border-color:var(--brand);background:linear-gradient(135deg,#ede9fe,#f5f3ff);}
    .progress-fill{background:linear-gradient(90deg,var(--brand),var(--brand-light));border-radius:99px;transition:width .4s;}
    .btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand-light));color:#fff;font-weight:700;border-radius:14px;padding:12px 28px;cursor:pointer;border:none;font-family:'Syne',sans-serif;box-shadow:0 4px 20px var(--brand-glow);}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed;}
    .btn-secondary{background:#fff;color:#1a1033;font-weight:700;border-radius:14px;padding:12px 28px;cursor:pointer;border:2px solid #e5e7eb;font-family:'Syne',sans-serif;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;

// answer index: 0 = Programming, 1 = Networking, 2 = Communications
const QUESTIONS=[
  {q:"What sparks your curiosity most when using your smartphone?",o:["How the apps and interfaces I interact with were built","How the phone connects to the internet and accesses my data securely","How the signal travels from the cell tower to my phone at ultra-high speeds"]},
  {q:"If you had to solve a technical problem, which challenge would you prefer?",o:["Searching for a bug in the code that prevents a program from executing a command","Fixing a sudden connection drop in a company's internal servers","Improving data transmission quality and reducing interference in wireless waves"]},
  {q:"Which of these terms are you most eager to learn about?",o:["Algorithms, AI, and languages like Python and Java","Internet Protocols (IP), Firewalls, and VPNs","Satellites, 6G networks, and Fiber Optics"]},
  {q:"How do you imagine your ideal work environment?",o:["Working behind a screen anywhere to build software systems","Managing a Server Room and connecting devices","Field/engineering work on transmission towers"]},
  {q:"What superpower would you like to have?",o:["Turn any innovative idea into an app used by millions","Build a digital fortress that protects company data","Connect remote areas to the world via satellite"]},
  {q:"In the world of Self-Driving Cars, what interests you most?",o:["The software/AI that makes driving decisions","The system that connects cars into a network","The radar/wave tech that lets the car see the road"]},
  {q:"What kind of tools would you prefer to use in your work?",o:["Code editors (like VS Code)","Routers, switches, monitoring tools","Frequency meters, antennas, transmission equipment"]},
  {q:"What is your ultimate goal in studying technology?",o:["Innovate smart software solutions","Keep the world digitally connected securely","Develop next-gen data transmission tech"]},
  {q:"When you hear about Cybersecurity, what comes to mind?",o:["Writing secure code that can't be exploited","Protecting internal networks from intrusion","Encrypting wireless communication"]},
  {q:"Which subject do you think would be most enjoyable for you?",o:["Data Structures","Network Architecture & IP routing","Field Theory & electromagnetic waves"]},
];

function QuizPage(){
  const [step,setStep]=useState(0);
  const [answers,setAnswers]=useState(Array(QUESTIONS.length).fill(null));
  const [submitting,setSubmitting]=useState(false);

  useEffect(()=>{ requireAuth(); },[]);

  const select=(idx)=>{
    const copy=[...answers];
    copy[step]=idx;
    setAnswers(copy);
  };

  const next=async()=>{
    if(step < QUESTIONS.length-1){
      setStep(step+1);
    } else {
      setSubmitting(true);
      const res = await apiFetch("/quiz/submit",{ method:"POST", body: JSON.stringify({answers}) });
      if(res){
        const data = await res.json();
        const user = getUser();
        user.quizCompleted = true;
        user.recommendedField = data.recommendedField;
        localStorage.setItem("user", JSON.stringify(user));
        window.location.href = "roadmap.html";
      }
      setSubmitting(false);
    }
  };

  const back=()=> step>0 && setStep(step-1);

  const q = QUESTIONS[step];
  const progress = ((step+1)/QUESTIONS.length)*100;

  return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}>
      <div className="card" style={{ width:'100%', maxWidth:560 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
          <span className="syne" style={{ fontWeight:800, color:'var(--brand)' }}>Careery Quiz</span>
          <span style={{ fontSize:13, color:'#6b7280' }}>{`Question ${step+1} of ${QUESTIONS.length}`}</span>
        </div>
        <div style={{ height:8, background:'#f3f4f6', borderRadius:99, marginBottom:24, overflow:'hidden' }}>
          <div className="progress-fill" style={{ width:`${progress}%`, height:'100%' }} />
        </div>

        <h2 className="syne" style={{ fontSize:20, fontWeight:800, marginBottom:20 }}>{q.q}</h2>

        {q.o.map((opt,i)=>(
          <div key={i} className={`option-card ${answers[step]===i?"selected":""}`} onClick={()=>select(i)}>
            {opt}
          </div>
        ))}

        <div style={{ display:'flex', justifyContent:'space-between', marginTop:20 }}>
          <button className="btn-secondary" onClick={back} disabled={step===0}>Back</button>
          <button className="btn-primary" onClick={next} disabled={answers[step]===null || submitting}>
            {submitting ? "..." : step===QUESTIONS.length-1 ? "See My Results" : "Next"}
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<QuizPage/>);
</script>
</body>
</html>
