<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Careery - Quiz Section</title>
    <!-- Tailwind CSS v3 CDN with plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Google Fonts for typography -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <style data-purpose="custom-config">
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .brand-purple {
            color: #6336c7;
        }

        .bg-brand-purple {
            background-color: #6336c7;
        }

        .border-brand-purple {
            border-color: #6336c7;
        }

        /* Custom shadow for the quiz card */
        .card-shadow {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">
    <!-- BEGIN: MainHeader -->
    <header class="bg-white border-b border-gray-100 px-8 py-4 flex items-center justify-between sticky top-0 z-50"
        data-purpose="navigation-bar">
        <div class="flex items-center gap-2">
            <!-- Careery Logo Placeholder -->
            <span class="text-2xl font-extrabold brand-purple tracking-tight">Careery</span>
        </div>
        <div class="flex items-center gap-6">
            <nav class="hidden md:flex items-center gap-6 text-sm font-medium text-gray-600">
                <a class="hover:text-gray-900" href="#">My Progress</a>
            </nav>
            <div class="flex items-center gap-4">
                <button class="text-gray-500 hover:text-gray-700">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
                            stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                    </svg>
                </button>
                <div
                    class="w-10 h-10 rounded-full bg-brand-purple text-white flex items-center justify-center font-semibold text-sm">
                    MZ
                </div>
            </div>
        </div>
    </header>
    <!-- END: MainHeader -->
    <main class="flex-grow container mx-auto max-w-5xl px-4 py-12" data-purpose="main-content">
        <!-- BEGIN: StepperIndicator -->
        <div class="mb-16 relative" data-purpose="stepper">
            <!-- Connection Lines -->
            <div class="w-[90%] absolute top-5 left-[5%] right-[15%] h-0.5 bg-gray-200 -z-10"></div>
            <div class="flex justify-between items-start">
                <!-- Step 1 -->
                <div class="flex flex-col items-center gap-3 w-32">
                    <div
                        class="w-10 h-10 rounded-full bg-white border-2 border-gray-200 flex items-center justify-center text-gray-400">
                        <svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                            <path clip-rule="evenodd"
                                d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z"
                                fill-rule="evenodd"></path>
                        </svg>
                    </div>
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest text-center">Step 1:
                        Explore</span>
                </div>
                <!-- Step 2 (Active) -->
                <div class="flex flex-col items-center gap-3 w-32">
                    <div
                        class="w-10 h-10 rounded-full bg-brand-purple flex items-center justify-center text-white shadow-lg">
                        <svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                            <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"></path>
                            <path clip-rule="evenodd"
                                d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z"
                                fill-rule="evenodd"></path>
                        </svg>
                    </div>
                    <span class="text-[10px] font-bold brand-purple uppercase tracking-widest text-center">Step 2:
                        Quiz</span>
                </div>
                <!-- Step 3 -->
                <div class="flex flex-col items-center gap-3 w-32">
                    <div
                        class="w-10 h-10 rounded-full bg-white border-2 border-gray-200 flex items-center justify-center text-gray-400">
                        <svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                            <path clip-rule="evenodd"
                                d="M12 1.586l-4 4v12.828l4-4V1.586zM3.707 3.293A1 1 0 002 4v10a1 1 0 00.293.707L6 18.414V5.586L3.707 3.293zM17.707 5.293L14 1.586v12.828l2.293 2.293A1 1 0 0018 16V6a1 1 0 00-.293-.707z"
                                fill-rule="evenodd"></path>
                        </svg>
                    </div>
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest text-center">Step 3:
                        Roadmap</span>
                </div>
            </div>
        </div>
        <!-- END: StepperIndicator -->
        <!-- BEGIN: ProgressSection -->
        <div class="mb-8" data-purpose="progress-display">
            <div class="flex justify-between items-end mb-3">
                <h2 class="text-lg font-semibold text-gray-800">Question 3 of 10</h2>
                <span class="text-sm font-bold brand-purple">30% Complete</span>
            </div>
            <div class="w-full bg-gray-200 h-2 rounded-full overflow-hidden">
                <div class="bg-brand-purple h-full w-[30%]" data-purpose="progress-bar-fill"></div>
            </div>
        </div>
        <!-- END: ProgressSection -->
        <!-- BEGIN: QuizCard -->
        <div class="bg-white rounded-2xl card-shadow p-12 mb-12" data-purpose="quiz-container">
            <h1 class="text-3xl font-bold text-gray-800 mb-10 max-w-2xl leading-tight">
                Which device is used to connect multiple networks together?
            </h1>
            <form class="space-y-4" data-purpose="quiz-form">
                <!-- Option 1 -->
                <label
                    class="flex items-center p-5 bg-gray-50 border border-transparent rounded-xl cursor-pointer hover:border-brand-purple transition-all group">
                    <input class="hidden peer" name="network-device" type="radio" value="switch" />
                    <span class="text-gray-700 font-medium group-hover:text-brand-purple">Switch</span>
                </label>
                <!-- Option 2 -->
                <label
                    class="flex items-center p-5 bg-gray-50 border border-transparent rounded-xl cursor-pointer hover:border-brand-purple transition-all group">
                    <input class="hidden peer" name="network-device" type="radio" value="router" />
                    <span class="text-gray-700 font-medium group-hover:text-brand-purple">Router</span>
                </label>
                <!-- Option 3 -->
                <label
                    class="flex items-center p-5 bg-gray-50 border border-transparent rounded-xl cursor-pointer hover:border-brand-purple transition-all group">
                    <input class="hidden peer" name="network-device" type="radio" value="hub" />
                    <span class="text-gray-700 font-medium group-hover:text-brand-purple">Hub</span>
                </label>
                <!-- Option 4 -->
                <label
                    class="flex items-center p-5 bg-gray-50 border border-transparent rounded-xl cursor-pointer hover:border-brand-purple transition-all group">
                    <input class="hidden peer" name="network-device" type="radio" value="modem" />
                    <span class="text-gray-700 font-medium group-hover:text-brand-purple">Modem</span>
                </label>
            </form>
            <!-- BEGIN: NavigationButtons -->
            <div class="mt-12 flex justify-between items-center" data-purpose="navigation-buttons">
                <button
                    class="px-8 py-3 rounded-xl border border-gray-200 text-gray-600 font-semibold hover:bg-gray-50 flex items-center gap-2 transition-colors">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke-linecap="round" stroke-linejoin="round"
                            stroke-width="2"></path>
                    </svg>
                    Back
                </button>
                <a href="roadmap.html"
                    class="px-10 py-3 rounded-xl bg-brand-purple text-white font-semibold hover:bg-opacity-90 flex items-center gap-2 transition-colors shadow-lg shadow-purple-200">
                    Next
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path d="M14 5l7 7m0 0l-7 7m7-7H3" stroke-linecap="round" stroke-linejoin="round"
                            stroke-width="2"></path>
                    </svg>
                </a>
            </div>
            <!-- END: NavigationButtons -->
        </div>
        <!-- END: QuizCard -->
    </main>
    <!-- BEGIN: Footer -->
    <footer class="bg-white border-t border-gray-100 py-6 px-8" data-purpose="footer">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <span class="text-lg font-bold text-gray-800">Careery</span>
            <p class="text-sm text-gray-500">
                © 2026 Careery | All rights reserved.
            </p>
        </div>
    </footer>
    <!-- END: Footer -->
</body>

</html>
