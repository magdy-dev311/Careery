<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Careery - Login / Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="app.js"></script>
  <style>
    :root{--brand:#6336c7;--brand-light:#8b5cf6;--brand-glow:rgba(99,54,199,0.18);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#faf8ff 0%,#fff 50%,#f5f3ff 100%);min-height:100vh;color:#1a1033;}
    h1,h2,h3,.syne{font-family:'Syne',sans-serif;}
    .card{background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(99,54,199,0.12);}
    .btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand-light));color:#fff;font-weight:700;border-radius:14px;padding:13px 28px;cursor:pointer;transition:all .2s;border:none;box-shadow:0 4px 20px var(--brand-glow);width:100%;font-family:'Syne',sans-serif;}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px var(--brand-glow);}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;}
    .input-field{width:100%;padding:12px 16px;border-radius:12px;border:2px solid #e5e7eb;font-size:14px;outline:none;transition:all .2s;font-family:inherit;}
    .input-field:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-glow);}
    .tab{padding:10px 20px;border-radius:10px;cursor:pointer;font-weight:700;transition:all .2s;}
    .tab.active{background:#fff;color:var(--brand);box-shadow:0 2px 8px rgba(0,0,0,.08);}
    .tab:not(.active){color:#6b7280;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;

function AuthPage(){
  const [mode,setMode]=useState("login");
  const [form,setForm]=useState({firstName:"",lastName:"",email:"",password:""});
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);

  const update=(k,v)=>setForm(prev=>({...prev,[k]:v}));

  const submit=async(e)=>{
    e.preventDefault();
    setError("");
    setLoading(true);
    try{
      const endpoint = mode==="login" ? "/auth/login" : "/auth/signup";
      const body = mode==="login"
        ? { email: form.email, password: form.password }
        : form;

      const res = await fetch(API_BASE+endpoint,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if(!res.ok){
        setError(data.message || "حدث خطأ، حاول مرة أخرى");
        setLoading(false);
        return;
      }
      saveSession(data.token, data.user);

      if(!data.user.quizCompleted){
        window.location.href = "quiz.html";
      } else {
        window.location.href = "roadmap.html";
      }
    }catch(err){
      setError("لا يمكن الوصول للسيرفر. تأكد إن الباك إند شغال على " + API_BASE);
    }
    setLoading(false);
  };

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div className="card" style={{width:'100%',maxWidth:420,padding:32}}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div className="syne" style={{fontSize:32,fontWeight:800,color:'var(--brand)'}}>Careery</div>
          <p style={{fontSize:14,color:'#6b7280',marginTop:4}}>Find your perfect tech career path</p>
        </div>

        <div style={{display:'flex',background:'#f3f4f6',borderRadius:12,padding:4,marginBottom:24}}>
          <div className={`tab ${mode==="login"?"active":""}`} style={{flex:1,textAlign:'center'}} onClick={()=>{setMode("login");setError("")}}>Login</div>
          <div className={`tab ${mode==="signup"?"active":""}`} style={{flex:1,textAlign:'center'}} onClick={()=>{setMode("signup");setError("")}}>Sign Up</div>
        </div>

        <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:14}}>
          {mode==="signup" && (
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <input className="input-field" placeholder="First Name" value={form.firstName} onChange={e=>update("firstName",e.target.value)} required />
              <input className="input-field" placeholder="Last Name" value={form.lastName} onChange={e=>update("lastName",e.target.value)} required />
            </div>
          )}
          <input type="email" className="input-field" placeholder="Email" value={form.email} onChange={e=>update("email",e.target.value)} required />
          <input type="password" className="input-field" placeholder="Password" value={form.password} onChange={e=>update("password",e.target.value)} required minLength={6} />

          {error && <p style={{color:'#ef4444',fontSize:13}}>{error}</p>}

          <button className="btn-primary" disabled={loading}>
            {loading ? "..." : mode==="login" ? "Login" : "Create Account"}
          </button>
        </form>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AuthPage/>);
</script>
</body>
</html>
