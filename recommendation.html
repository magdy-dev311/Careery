<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Careery - Explore More</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --brand: #6336c7;
            --brand-light: #8b5cf6;
            --brand-dark: #4c1d95;
            --brand-glow: rgba(99, 54, 199, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f8f7ff;
            color: #1a1033;
        }

        h1,
        h2,
        h3,
        h4,
        .syne {
            font-family: 'Syne', sans-serif;
        }

        a {
            text-decoration: none;
        }

        .bg-blob {
            position: fixed;
            top: -150px;
            right: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-up {
            animation: fadeUp 0.5s ease both;
        }

        .expert-card {
            background: #fff;
            border: 1.5px solid #ede9fe;
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            transition: all 0.25s;
        }

        .expert-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(99, 54, 199, 0.12);
            border-color: var(--brand);
        }

        .podcast-card {
            background: #fff;
            border: 1.5px solid #ede9fe;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.25s;
            cursor: pointer;
        }

        .podcast-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(99, 54, 199, 0.1);
        }

        .podcast-thumb {
            aspect-ratio: 1;
            position: relative;
            overflow: hidden;
            background: #1a1033;
        }

        .podcast-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .podcast-card:hover .podcast-thumb img {
            transform: scale(1.05);
        }

        .book-row {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .star {
            color: #f59e0b;
            font-size: 14px;
        }

        .filter-btn {
            padding: 8px 18px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: 'DM Sans', sans-serif;
        }

        .filter-btn-active {
            background: linear-gradient(135deg, var(--brand), var(--brand-light));
            color: #fff;
            box-shadow: 0 4px 16px var(--brand-glow);
        }

        .filter-btn-inactive {
            background: #f3f4f6;
            color: #6b7280;
        }

        .filter-btn-inactive:hover {
            background: #ede9fe;
            color: var(--brand);
        }

        .roadmap-step {
            background: #fff;
            border: 1.5px solid #ede9fe;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }

        .roadmap-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 26px;
        }

        .social-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #9ca3af;
            padding: 4px;
            transition: color 0.2s;
        }

        .social-btn:hover {
            color: var(--brand);
        }

        .listen-btn {
            width: 100%;
            padding: 10px;
            background: #f3f4f6;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
            color: #374151;
        }

        .listen-btn:hover {
            background: #ede9fe;
            color: var(--brand);
        }

        .scroll-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 12px;
            scrollbar-width: none;
        }

        .scroll-container::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

                                <h2 className="syne" style={{ fontSize: 'clamp(24px,4vw,36px)', fontWeight: 800, marginBottom: 12 }}>Your Growth Roadmap</h2>
                                <p style={{ color: '#6b7280', marginBottom: 52, fontSize: 15, maxWidth: 480, margin: '0 auto 52px' }}>A continuous cycle of learning, listening, and leading. Follow this path to career mastery.</p>
                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(220px,1fr))', gap: 20, position: 'relative' }}>
                                    {/* connector lines — desktop only */}
                                    {ROADMAP_STEPS.map((s, i) => (
                                        <div key={i} className="roadmap-step">
                                            <div className="roadmap-icon" style={{ background: s.color, color: s.iconColor }}>{s.icon}</div>
                                            <h4 className="syne" style={{ fontSize: 16, fontWeight: 700, marginBottom: 8 }}>{i + 1}. {s.title}</h4>
                                            <p style={{ color: '#6b7280', fontSize: 13, lineHeight: 1.6 }}>{s.desc}</p>
                                        </div>
                                    ))}
                                </div>
                                
                            </div>
                        </section>
                    </main>

                    {/* Book Details Modal */}
                    {selectedBook && (
                        <div onClick={() => setSelectedBook(null)} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', zIndex: 100, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
                            <div onClick={e => e.stopPropagation()} style={{ background: '#fff', borderRadius: 24, padding: 32, maxWidth: 500, width: '100%', position: 'relative', boxShadow: '0 24px 80px rgba(99,54,199,0.2)' }}>
                                <button onClick={() => setSelectedBook(null)} style={{ position: 'absolute', top: 16, right: 16, background: 'none', border: 'none', cursor: 'pointer', color: '#9ca3af', padding: 4 }}>
                                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" /></svg>
                                </button>
                                <div style={{ display: 'flex', gap: 20, marginBottom: 24 }}>
                                    <div style={{ width: 80, flexShrink: 0, borderRadius: 8, overflow: 'hidden', boxShadow: '0 8px 24px rgba(0,0,0,0.15)' }}>
                                        <img src={selectedBook.img} alt={selectedBook.title} style={{ width: '100%' }} />
                                    </div>
                                    <div>
                                        <h3 className="syne" style={{ fontSize: 20, fontWeight: 800, marginBottom: 4 }}>{selectedBook.title}</h3>
                                        <p style={{ fontSize: 13, color: '#9ca3af', marginBottom: 8 }}>by {selectedBook.author}</p>
                                        <div style={{ display: 'flex', gap: 2 }}>
                                            {[...Array(selectedBook.stars)].map((_, j) => <span key={j} className="star">★</span>)}
                                        </div>
                                    </div>
                                </div>
                                <div style={{ background: '#f8f7ff', borderRadius: 14, padding: '16px 20px', marginBottom: 16, borderLeft: '4px solid var(--brand)' }}>
                                    <p style={{ fontSize: 11, fontWeight: 700, color: 'var(--brand)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 8 }}>💡 هيفيدك إزاي؟</p>
                                    <p style={{ fontSize: 14, color: '#374151', lineHeight: 1.7 }}>{selectedBook.benefit}</p>
                                </div>
                                <div style={{ marginBottom: 24 }}>
                                    <p style={{ fontSize: 11, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 8 }}>📖 تفاصيل الكتاب</p>
                                    <p style={{ fontSize: 14, color: '#374151', lineHeight: 1.7 }}>{selectedBook.details}</p>
                                </div>
                                <a href={selectedBook.downloadUrl} target="_blank" rel="noopener noreferrer" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, width: '100%', padding: '12px 0', background: 'linear-gradient(135deg,#6336c7,#8b5cf6)', color: '#fff', borderRadius: 12, fontWeight: 700, fontSize: 14, textDecoration: 'none' }}>
                                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" /></svg>
                                    تحميل الكتاب
                                </a>
                            </div>
                        </div>
                    )}

                    <footer style={{ background: '#f8f7ff', borderTop: '1px solid #f0eefe', padding: '28px 24px' }}>
                        <div style={{ maxWidth: 1200, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 }}>
                            <span className="syne" style={{ fontSize: 18, fontWeight: 800 }}>Careery</span>
                            <span style={{ fontSize: 13, color: '#9ca3af' }}>© 2026 Careery | All rights reserved.</span>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
