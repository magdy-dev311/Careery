<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Careery - My Roadmap</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="app.js"></script>
  <style>
    :root{--brand:#6336c7;--brand-light:#8b5cf6;--brand-glow:rgba(99,54,199,0.18);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:#f8f7ff;color:#1a1033;}
    h1,h2,h3,.syne{font-family:'Syne',sans-serif;}
    a{text-decoration:none;}
    .card{background:#fff;border:1.5px solid #ede9fe;border-radius:16px;padding:18px 20px;display:flex;align-items:center;gap:16px;margin-bottom:12px;transition:all .2s;}
    .card.done{border-color:#bbf7d0;background:#f0fdf4;}
    .checkbox{width:28px;height:28px;border-radius:50%;border:2px solid #d1d5db;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;}
    .checkbox.done{background:#16a34a;border-color:#16a34a;color:#fff;}
    .explore-banner{background:linear-gradient(135deg,var(--brand),var(--brand-light));border-radius:20px;padding:24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;color:#fff;margin-bottom:32px;}
    .btn-white{background:#fff;color:var(--brand);font-weight:800;border-radius:12px;padding:12px 28px;font-family:'Syne',sans-serif;}
    .progress-fill{background:linear-gradient(90deg,var(--brand),var(--brand-light));border-radius:99px;transition:width .4s;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;

const FIELD_LABEL = {
  programming: { en:"Programming Roadmap", icon:"💻" },
  networking: { en:"Networking Roadmap", icon:"🌐" },
  communications: { en:"Communications Roadmap", icon:"📡" },
};

function Header(){
  return (
    <header style={{ background:'#fff', borderBottom:'1px solid #f0eefe', position:'sticky', top:0, zIndex:50 }}>
      <div style={{ maxWidth:900, margin:'0 auto', padding:'16px 24px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <a href="index.html" className="syne" style={{ fontSize:22, fontWeight:800, color:'var(--brand)' }}>Careery</a>
        <a href="profile.html" title="Profile" style={{ width:36, height:36, borderRadius:'50%', background:'linear-gradient(135deg,#6336c7,#8b5cf6)', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:700, fontSize:12 }}>{getInitials()}</a>
      </div>
    </header>
  );
}

function RoadmapPage(){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState("");

  const load=async()=>{
    const res = await apiFetch("/roadmap");
    if(!res) return;
    if(res.status===404){
      window.location.href = "quiz.html";
      return;
    }
    const json = await res.json();
    setData(json);
    setLoading(false);
  };

  useEffect(()=>{
    if(!requireAuth()) return;
    load();
  },[]);

  const toggle=async(stepId, currentlyDone)=>{
    // optimistic UI update
    setData(prev=>{
      const steps = prev.steps.map(s=> s.id===stepId ? {...s, completed:!currentlyDone} : s);
      const done = steps.filter(s=>s.completed).length;
      return {...prev, steps, progress:{...prev.progress, completed:done, percentage: Math.round((done/steps.length)*100)}};
    });
    await apiFetch("/roadmap/progress",{ method:"POST", body: JSON.stringify({ stepId, completed: !currentlyDone }) });
  };

  if(loading) return <div style={{ padding:60, textAlign:'center', color:'#9ca3af' }}>Loading...</div>;
  if(!data) return null;

  const field = FIELD_LABEL[data.field] || {en:"Roadmap", icon:"🗺️"};

  return (
    <div>
      <Header/>
      <main style={{ maxWidth:900, margin:'0 auto', padding:'32px 24px 64px' }}>

        {/* Prominent Explore link */}
        <div className="explore-banner">
          <div>
            <div className="syne" style={{ fontSize:20, fontWeight:800, marginBottom:4 }}>Want to go deeper? 🚀</div>
            <div style={{ fontSize:14, opacity:0.9 }}>Explore top experts, podcasts & books for your field</div>
          </div>
          <a href="explore.html" className="btn-white">Go to Explore →</a>
        </div>

        <div style={{ textAlign:'center', marginBottom:32 }}>
          <div style={{ fontSize:40, marginBottom:8 }}>{field.icon}</div>
          <h1 className="syne" style={{ fontSize:'clamp(26px,4vw,38px)', fontWeight:800 }}>{field.en}</h1>
          <p style={{ color:'#6b7280', marginTop:8 }}>
            {data.progress.completed} of {data.progress.total} steps completed ({data.progress.percentage}%)
          </p>
          <div style={{ height:10, background:'#f3f4f6', borderRadius:99, marginTop:12, maxWidth:400, marginLeft:'auto', marginRight:'auto', overflow:'hidden' }}>
            <div className="progress-fill" style={{ width:`${data.progress.percentage}%`, height:'100%' }} />
          </div>
        </div>

        {data.steps.map((s,i)=>(
          <div key={s.id} className={`card ${s.completed?"done":""}`}>
            <div className={`checkbox ${s.completed?"done":""}`} onClick={()=>toggle(s.id,s.completed)}>
              {s.completed ? "✓" : ""}
            </div>
            <div>
              <div style={{ fontSize:12, fontWeight:700, color:'var(--brand)', marginBottom:2 }}>STEP {i+1}</div>
              <div style={{ fontWeight:700 }}>{s.title.en}</div>
            </div>
          </div>
        ))}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<RoadmapPage/>);
</script>
</body>
</html>
