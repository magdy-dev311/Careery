<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Careery - Your Roadmap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --brand: #6336c7;
            --brand-light: #8b5cf6;
            --brand-dark: #4c1d95;
            --brand-glow: rgba(99, 54, 199, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f8f7ff;
            color: #1a1033;
        }

        h1,
        h2,
        h3,
        h4,
        .syne {
            font-family: 'Syne', sans-serif;
        }

        a {
            text-decoration: none;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .node-card {
            background: #fff;
            border: 1.5px solid #ede9fe;
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: 0 4px 20px rgba(99, 54, 199, 0.06);
            transition: all 0.2s;
        }

        .node-card:hover {
            border-color: var(--brand);
            box-shadow: 0 8px 32px rgba(99, 54, 199, 0.14);
            transform: translateY(-2px);
        }

        .node-dot {
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #fff;
            flex-shrink: 0;
        }

        .node-dot-done {
            background: linear-gradient(135deg, #6336c7, #8b5cf6);
            box-shadow: 0 4px 16px rgba(99, 54, 199, 0.35);
        }

        .node-dot-active {
            background: linear-gradient(135deg, #6336c7, #8b5cf6);
            box-shadow: 0 4px 20px rgba(99, 54, 199, 0.4);
            animation: float 3s ease-in-out infinite;
        }

        .node-dot-locked {
            background: #e5e7eb;
        }

        .timeline-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 3px;
            transform: translateX(-50%);
            background: linear-gradient(180deg, #6336c7 0%, #8b5cf6 40%, #e5e7eb 70%, rgba(229, 231, 235, 0.3) 100%);
            z-index: 0;
        }

        .stepper-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .progress-bar {
            height: 8px;
            border-radius: 99px;
            background: #e5e7eb;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--brand), var(--brand-light));
            transition: width 0.5s ease;
        }

        .live-badge {
            background: #ef4444;
            color: #fff;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 3px 8px;
            border-radius: 99px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        @keyframes pulseDot {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            animation: pulseDot 1.2s infinite;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const NODES = [
            { id: 1, type: 'done', side: 'right', title: 'Intro to Design Logic', label: 'Module 1.1', top: 0 },
            { id: 2, type: 'done', side: 'left', title: 'Visual Hierarchy', label: 'Module 1.2', top: 1 },
            { id: 3, type: 'quiz', side: 'right', title: 'Quiz Station', label: 'Score: 100%', top: 2 },
            { id: 4, type: 'active', side: 'left', title: 'Advanced Layout Patterns', label: 'Current Station · 12 mins · Intermediate', top: 3 },
            { id: 5, type: 'locked', side: 'right', title: 'Interaction States', label: 'Module 2.1', top: 4 },
            { id: 6, type: 'locked', side: 'left', title: 'Unit Quiz', label: 'Complete prev to unlock', top: 5 },
            { id: 7, type: 'capstone', side: 'right', title: 'System Architecture Project', label: 'Capstone · Locked', top: 6 },
            { id: 8, type: 'interview', side: 'left', title: 'Technical Interview', label: 'Live Session · Defense your decisions', top: 7 },
            { id: 9, type: 'certificate', side: 'right', title: 'Certificate', label: 'You made it!', top: 8 },
        ];

        const STEPPER = [
            { label: 'Explore', icon: '🔍' },
            { label: 'Quiz', icon: '📋' },
            { label: 'Roadmap', icon: '🗺️', active: true },
        ];

        function Stepper() {
            return (
                <div style={{ position: 'relative', marginBottom: 0, maxWidth: 600, margin: '0 auto' }}>
                    <div style={{ position: 'absolute', top: 20, left: '10%', right: '10%', height: 2, background: '#e5e7eb', zIndex: 0 }} />
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', position: 'relative', zIndex: 1 }}>
                        {STEPPER.map((s, i) => (
                            <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, width: 100 }}>
                                <div className="stepper-dot" style={{
                                    background: s.active ? 'linear-gradient(135deg,#6336c7,#8b5cf6)' : '#fff',
                                    border: `2px solid ${s.active ? '#6336c7' : '#e5e7eb'}`,
                                    color: s.active ? '#fff' : '#9ca3af',
                                    boxShadow: s.active ? '0 4px 16px rgba(99,54,199,0.3)' : 'none',
                                }}>{s.icon}</div>
                                <span style={{ fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: s.active ? '#6336c7' : '#9ca3af', textAlign: 'center' }}>
                                    Step {i + 1}: {s.label}
                                </span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function NodeDot({ type }) {
            const base = { width: 52, height: 52 };
            if (type === 'done') return <div className="node-dot node-dot-done" style={{ ...base, fontSize: 20 }}>✓</div>;
            if (type === 'active') return <div className="node-dot node-dot-active" style={{ ...base, fontSize: 22 }}>▶</div>;
            if (type === 'quiz') return <div style={{ ...base, borderRadius: 12, background: '#f59e0b', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22, fontWeight: 900, color: '#fff', border: '4px solid #fff', boxShadow: '0 4px 16px rgba(245,158,11,0.4)', transform: 'rotate(12deg)', flexShrink: 0 }}>Q</div>;
            if (type === 'certificate') return <div style={{ ...base, borderRadius: '50%', background: 'linear-gradient(135deg,#f59e0b,#fbbf24)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24, border: '4px solid #fff', boxShadow: '0 6px 24px rgba(245,158,11,0.4)', flexShrink: 0 }}>🏆</div>;
            if (type === 'interview') return <div style={{ ...base, borderRadius: '50%', background: 'linear-gradient(135deg,#6336c7,#8b5cf6)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22, border: '4px solid #fff', boxShadow: '0 4px 16px rgba(99,54,199,0.4)', flexShrink: 0 }}>🎤</div>;
            return <div className="node-dot node-dot-locked" style={{ ...base, fontSize: 18, color: '#d1d5db', border: '4px solid #fff' }}>🔒</div>;
        }

        function RoadmapNode({ node }) {
            const isRight = node.side === 'right';
            const isDone = node.type === 'done';
            const isActive = node.type === 'active';
            const isLocked = node.type === 'locked';
            const isCertificate = node.type === 'certificate';
            const isInterview = node.type === 'interview';

            return (
                <div style={{
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: isRight ? 'flex-start' : 'flex-end',
                    paddingLeft: isRight ? '52%' : 0,
                    paddingRight: isRight ? 0 : '52%',
                    marginBottom: 56,
                    position: 'relative',
                    zIndex: 1,
                }}>
                    {/* Dot on center */}
                    <div style={{
                        position: 'absolute',
                        left: '50%',
                        top: '50%',
                        transform: 'translate(-50%,-50%)',
                        zIndex: 2,
                    }}>
                        <NodeDot type={node.type} />
                    </div>

                    <div className={`node-card ${isLocked ? 'opacity-50' : ''}`} style={{
                        maxWidth: 280,
                        width: '100%',
                        background: isDone ? 'linear-gradient(135deg,#f5f3ff,#ede9fe)' : isActive ? '#fff' : isCertificate ? 'linear-gradient(135deg,#fffbeb,#fef3c7)' : '#fff',
                        border: isActive ? '2px solid #6336c7' : isDone ? '1.5px solid #c4b5fd' : isCertificate ? '1.5px solid #fbbf24' : '1.5px solid #e5e7eb',
                        boxShadow: isActive ? '0 8px 32px rgba(99,54,199,0.2)' : undefined,
                        opacity: isLocked ? 0.55 : 1,
                    }}>
                        {isInterview && (
                            <div style={{ marginBottom: 8 }}>
                                <span className="live-badge"><span className="live-dot" />Live Session</span>
                            </div>
                        )}
                        <div style={{ fontSize: 9, fontWeight: 700, color: isDone ? '#7c3aed' : isActive ? '#6336c7' : '#9ca3af', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 4 }}>
                            {node.label}
                        </div>
                        <div className="syne" style={{ fontSize: 14, fontWeight: 700, color: isLocked ? '#9ca3af' : '#1a1033', lineHeight: 1.4 }}>
                            {node.title}
                        </div>
                        {isActive && (
                            <div style={{ marginTop: 10, display: 'flex', gap: 8 }}>
                                <a href="career-path.html" style={{ background: 'linear-gradient(135deg,#6336c7,#8b5cf6)', color: '#fff', fontSize: 11, fontWeight: 700, padding: '6px 14px', borderRadius: 8, fontFamily: 'Syne,sans-serif' }}>Continue →</a>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function App() {
            const [expanded, setExpanded] = useState(false);
            return (
                <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
                    {/* Header */}
                    <header style={{ background: '#fff', borderBottom: '1px solid #f0eefe', position: 'sticky', top: 0, zIndex: 50 }}>
                        <div style={{ maxWidth: 1100, margin: '0 auto', padding: '16px 24px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <span className="syne" style={{ fontSize: 22, fontWeight: 800, color: 'var(--brand)' }}>Careery</span>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                                <a href="index.html" style={{ fontSize: 13, fontWeight: 600, color: '#6b7280' }}>My Progress</a>
                                <div style={{ width: 38, height: 38, borderRadius: '50%', background: 'linear-gradient(135deg,#6336c7,#8b5cf6)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 700, fontSize: 13 }}>MZ</div>
                            </div>
                        </div>
                    </header>

                    <main style={{ maxWidth: 900, margin: '0 auto', padding: '40px 24px 80px', width: '100%', position: 'relative' }}>
                        {/* Stepper */}
                        <div style={{ marginBottom: 40 }}>
                            <Stepper />
                        </div>

                        {/* Hero */}
                        <div style={{ textAlign: 'center', marginBottom: 40, position: 'relative' }}>
                            <h1 className="syne" style={{ fontSize: 'clamp(32px,5vw,52px)', fontWeight: 800, marginBottom: 12 }}>Your Roadmap</h1>
                            <p style={{ color: '#6b7280', fontSize: 16, maxWidth: 500, margin: '0 auto' }}>
                                Follow this curated sequence of learning and building to reach your professional pinnacle.
                            </p>
                            {/* Progress card */}
                            <div style={{
                                display: 'inline-block',
                                marginTop: 28,
                                background: '#fff',
                                border: '1.5px solid #ede9fe',
                                borderRadius: 16,
                                padding: '16px 24px',
                                boxShadow: '0 4px 24px rgba(99,54,199,0.08)',
                                minWidth: 240,
                                textAlign: 'left',
                            }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                                    <span style={{ fontSize: 10, fontWeight: 700, color: '#9ca3af', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Your Progress</span>
                                    <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--brand)' }}>35%</span>
                                </div>
                                <div className="progress-bar" style={{ marginBottom: 8 }}>
                                    <div className="progress-fill" style={{ width: '35%' }} />
                                </div>
                                <p style={{ fontSize: 11, color: '#9ca3af' }}>3 units remaining until next step</p>
                            </div>
                        </div>

                        {/* Timeline */}
                        <div style={{ position: 'relative', paddingBottom: 80 }}>
                            <div className="timeline-line" />
                            {NODES.map(node => <RoadmapNode key={node.id} node={node} />)}
                        </div>
                    </main>

                    <footer style={{ background: '#fff', borderTop: '1px solid #f0eefe', padding: '24px' }}>
                        <div style={{ maxWidth: 1100, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 }}>
                            <span className="syne" style={{ fontSize: 16, fontWeight: 800 }}>Careery</span>
                            <span style={{ fontSize: 13, color: '#9ca3af' }}>© 2026 Careery | All rights reserved.</span>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
