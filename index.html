<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --brand: #6336c7;
            --brand-light: #8b5cf6;
            --brand-dark: #4c1d95;
            --brand-glow: rgba(99, 54, 199, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #fff;
            color: #1a1033;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4,
        .syne {
            font-family: 'Syne', sans-serif;
        }

        .bg-blob {
            position: fixed;
            top: -200px;
            right: -200px;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: blobPulse 9s ease-in-out infinite;
        }

        .bg-blob-2 {
            position: fixed;
            bottom: -200px;
            left: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(244, 114, 182, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: blobPulse 11s ease-in-out infinite reverse;
        }

        @keyframes blobPulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08) translate(15px, -15px);
            }
        }

        @keyframes floatUp {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-up {
            animation: fadeSlideUp 0.6s ease forwards;
        }

        .fade-up-1 {
            animation: fadeSlideUp 0.6s 0.1s ease both;
        }

        .fade-up-2 {
            animation: fadeSlideUp 0.6s 0.25s ease both;
        }

        .fade-up-3 {
            animation: fadeSlideUp 0.6s 0.4s ease both;
        }

        .float-tag {
            animation: floatUp 3.5s ease-in-out infinite;
        }

        .float-tag-2 {
            animation: floatUp 4.5s 0.5s ease-in-out infinite;
        }

        .float-tag-3 {
            animation: floatUp 4s 1s ease-in-out infinite;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--brand), var(--brand-light));
            color: #fff;
            font-weight: 700;
            border-radius: 14px;
            padding: 14px 32px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Syne', sans-serif;
            box-shadow: 0 6px 24px var(--brand-glow);
            border: none;
            display: inline-block;
            text-decoration: none;
            font-size: 16px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 36px var(--brand-glow);
        }

        .btn-outline {
            background: #fff;
            color: #1a1033;
            font-weight: 700;
            border-radius: 14px;
            padding: 14px 32px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Syne', sans-serif;
            border: 2px solid #e5e7eb;
            display: inline-block;
            text-decoration: none;
            font-size: 16px;
        }

        .btn-outline:hover {
            border-color: var(--brand);
            color: var(--brand);
        }

        .feature-card {
            background: #fff;
            border: 1px solid #f0eefe;
            border-radius: 20px;
            padding: 36px;
            transition: all 0.3s;
            box-shadow: 0 2px 16px rgba(99, 54, 199, 0.04);
        }

        .feature-card:hover {
            box-shadow: 0 12px 40px rgba(99, 54, 199, 0.12);
            transform: translateY(-4px);
            border-color: rgba(99, 54, 199, 0.2);
        }

        .step-num {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 2px solid var(--brand);
            color: var(--brand);
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .step-row:hover .step-num {
            background: var(--brand);
            color: #fff;
        }

        .testimonial-card {
            background: #fff;
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 2px 20px rgba(99, 54, 199, 0.05);
            border: 1px solid #f0eefe;
        }

        nav a {
            text-decoration: none;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
