<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Careery - Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="app.js"></script>
  <style>
    :root{--brand:#6336c7;--brand-light:#8b5cf6;--brand-glow:rgba(99,54,199,0.18);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:#f8f7ff;color:#1a1033;}
    h1,h2,h3,.syne{font-family:'Syne',sans-serif;}
    a{text-decoration:none;}
    .card{background:#fff;border:1.5px solid #ede9fe;border-radius:20px;padding:32px;}
    .btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand-light));color:#fff;font-weight:700;border-radius:14px;padding:12px 24px;cursor:pointer;border:none;font-family:'Syne',sans-serif;box-shadow:0 4px 20px var(--brand-glow);}
    .btn-outline{background:#fff;color:#1a1033;font-weight:700;border-radius:14px;padding:12px 24px;cursor:pointer;border:2px solid #e5e7eb;font-family:'Syne',sans-serif;}
    .input-field{width:100%;padding:12px 16px;border-radius:12px;border:2px solid #e5e7eb;font-size:14px;outline:none;font-family:inherit;}
    .input-field:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-glow);}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;

const FIELD_LABEL = {
  programming: { en:"Programming", icon:"💻" },
  networking: { en:"Networking", icon:"🌐" },
  communications: { en:"Communications", icon:"📡" },
};

function Header(){
  return (
    <header style={{ background:'#fff', borderBottom:'1px solid #f0eefe', position:'sticky', top:0, zIndex:50 }}>
      <div style={{ maxWidth:1200, margin:'0 auto', padding:'16px 24px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <a href="index.html" className="syne" style={{ fontSize:22, fontWeight:800, color:'var(--brand)' }}>Careery</a>
        <a href="roadmap.html" style={{ fontSize:13, fontWeight:600, color:'#6b7280' }}>My Roadmap</a>
      </div>
    </header>
  );
}

function ProfilePage(){
  const [user,setUser]=useState(getUser());
  const [firstName,setFirstName]=useState("");
  const [lastName,setLastName]=useState("");
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState("");

  useEffect(()=>{
    if(!requireAuth()) return;
    (async()=>{
      const res = await apiFetch("/users/me");
      if(!res) return;
      const data = await res.json();
      setUser(data.user);
      setFirstName(data.user.firstName);
      setLastName(data.user.lastName);
      localStorage.setItem("user", JSON.stringify(data.user));
    })();
  },[]);

  const save=async(e)=>{
    e.preventDefault();
    setSaving(true);
    setMsg("");
    const res = await apiFetch("/users/me",{ method:"PUT", body: JSON.stringify({firstName,lastName}) });
    if(res){
      const data = await res.json();
      setUser(data.user);
      localStorage.setItem("user", JSON.stringify(data.user));
      setMsg("✅ تم الحفظ");
    }
    setSaving(false);
  };

  if(!user) return null;
  const field = user.recommendedField ? FIELD_LABEL[user.recommendedField] : null;

  return (
    <div>
      <Header/>
      <main style={{ maxWidth:600, margin:'40px auto', padding:'0 24px' }}>
        <div className="card" style={{ textAlign:'center', marginBottom:24 }}>
          <div style={{ width:88, height:88, borderRadius:'50%', background:'linear-gradient(135deg,#6336c7,#8b5cf6)', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:800, fontSize:28, margin:'0 auto 16px' }}>
            {getInitials()}
          </div>
          <h2 className="syne" style={{ fontSize:24, fontWeight:800 }}>{user.firstName} {user.lastName}</h2>
          <p style={{ color:'#9ca3af', fontSize:14, marginTop:4 }}>{user.email}</p>

          {field && (
            <div style={{ marginTop:20, display:'inline-flex', alignItems:'center', gap:8, background:'#ede9fe', padding:'8px 16px', borderRadius:99 }}>
              <span style={{ fontSize:18 }}>{field.icon}</span>
              <span style={{ fontWeight:700, color:'var(--brand)', fontSize:13 }}>Recommended: {field.en}</span>
            </div>
          )}
        </div>

        <div className="card" style={{ marginBottom:24 }}>
          <h3 className="syne" style={{ fontSize:18, fontWeight:700, marginBottom:16 }}>Edit Profile</h3>
          <form onSubmit={save} style={{ display:'flex', flexDirection:'column', gap:12 }}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
              <input className="input-field" value={firstName} onChange={e=>setFirstName(e.target.value)} placeholder="First Name" />
              <input className="input-field" value={lastName} onChange={e=>setLastName(e.target.value)} placeholder="Last Name" />
            </div>
            {msg && <p style={{ color:'#16a34a', fontSize:13 }}>{msg}</p>}
            <button className="btn-primary" disabled={saving}>{saving?"Saving...":"Save Changes"}</button>
          </form>
        </div>

        <div style={{ display:'flex', gap:12 }}>
          <a href="roadmap.html" className="btn-outline" style={{ flex:1, textAlign:'center' }}>My Roadmap</a>
          <button onClick={logout} className="btn-outline" style={{ flex:1, color:'#ef4444', borderColor:'#fecaca' }}>Logout</button>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ProfilePage/>);
</script>
</body>
</html>
