<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Careery - Explore Your Career Path</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --brand: #6336c7;
            --brand-light: #8b5cf6;
            --brand-dark: #4c1d95;
            --brand-glow: rgba(99, 54, 199, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f8f7ff;
            color: #1a1033;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        .syne {
            font-family: 'Syne', sans-serif;
        }

        a {
            text-decoration: none;
        }

        .bg-blob {
            position: fixed;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-up {
            animation: fadeSlideUp 0.5s ease both;
        }

        .fade-up-1 {
            animation: fadeSlideUp 0.5s 0.1s ease both;
        }

        .fade-up-2 {
            animation: fadeSlideUp 0.5s 0.2s ease both;
        }

        .card {
            background: #fff;
            border: 1.5px solid #ede9fe;
            border-radius: 20px;
            padding: 28px;
            transition: all 0.25s;
            cursor: pointer;
        }

        .card:hover {
            border-color: var(--brand);
            box-shadow: 0 8px 32px rgba(99, 54, 199, 0.12);
            transform: translateY(-3px);
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            transition: transform 0.25s;
        }

        .card:hover .card-icon {
            transform: scale(1.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--brand), var(--brand-light));
            color: #fff;
            font-weight: 700;
            border-radius: 99px;
            padding: 16px 44px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Syne', sans-serif;
            box-shadow: 0 6px 28px var(--brand-glow);
            border: none;
            font-size: 17px;
            display: inline-block;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px var(--brand-glow);
        }

        .video-card {
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16/9;
            background: #1a1033;
            cursor: pointer;
        }

        .play-btn {
            width: 72px;
            height: 72px;
            background: var(--brand);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            box-shadow: 0 8px 32px rgba(99, 54, 199, 0.4);
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 48px rgba(99, 54, 199, 0.5);
        }

        .tag-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 99px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .stepper-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const CATEGORIES = [
            {
                icon: "💻", color: "#ede9fe", iconColor: "#6336c7",
                title: "Programming", sub: "Frontend · Backend · Full Stack · Mobile", href: "quiz.html"
            },
            {
                icon: "🌐", color: "#f0fdf4", iconColor: "#16a34a",
                title: "Networking", sub: "Infrastructure · Security · Cloud · DevOps", href: "quiz.html"
            },
            {
                icon: "📡", color: "#fff7ed", iconColor: "#ea580c",
                title: "Telecommunications", sub: "Systems · Signals · IoT · 5G", href: "quiz.html"
            },
        ];

        const STEPS = [
            { label: "Explore", icon: "🔍", active: true },
            { label: "Quiz", icon: "📋", active: false },
            { label: "Roadmap", icon: "🗺️", active: false },
        ];

        function Stepper() {
            return (
                <div style={{ position: 'relative', marginBottom: 56 }}>
                    <div style={{ position: 'absolute', top: 20, left: '10%', right: '10%', height: 2, background: '#e5e7eb', zIndex: 0 }} />
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', position: 'relative', zIndex: 1 }}>
                        {STEPS.map((s, i) => (
                            <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, width: 100 }}>
                                <div className="stepper-dot" style={{
                                    background: s.active ? 'linear-gradient(135deg,#6336c7,#8b5cf6)' : '#fff',
                                    border: `2px solid ${s.active ? '#6336c7' : '#e5e7eb'}`,
                                    color: s.active ? '#fff' : '#9ca3af',
                                    boxShadow: s.active ? '0 4px 16px rgba(99,54,199,0.3)' : 'none',
                                }}>{s.icon}</div>
                                <span style={{ fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: s.active ? '#6336c7' : '#9ca3af', textAlign: 'center', fontFamily: 'DM Sans,sans-serif' }}>
                                    Step {i + 1}: {s.label}
                                </span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function App() {
            const [menuOpen, setMenuOpen] = useState(false);
            return (
                <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
                    <div className="bg-blob" />
                    {/* Header */}
                    <header style={{ background: '#fff', borderBottom: '1px solid #f0eefe', position: 'sticky', top: 0, zIndex: 50 }}>
                        <div style={{ maxWidth: 1200, margin: '0 auto', padding: '16px 24px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <span className="syne" style={{ fontSize: 22, fontWeight: 800, color: 'var(--brand)' }}>Careery</span>
                            <div style={{ display: 'flex', gap: 16, alignItems: 'center' }}>
                                <a href="index.html" style={{ fontSize: 14, fontWeight: 600, color: '#6b7280', display: 'none' }} className="nav-link">Home</a>
                                <a href="index.html" style={{ fontSize: 14, fontWeight: 600, color: '#6b7280' }}>Log In</a>
                                <a href="quiz.html" className="btn-primary" style={{ padding: '10px 22px', fontSize: 14, borderRadius: 12 }}>Sign Up</a>
                            </div>
                        </div>
                    </header>

                    <main style={{ flex: 1, position: 'relative', zIndex: 1 }}>
                        {/* Stepper */}
                        <div style={{ maxWidth: 700, margin: '0 auto', padding: '40px 24px 0' }}>
                            <Stepper />
                        </div>

                        {/* Hero */}
                        <section style={{ textAlign: 'center', padding: '0 24px 48px', maxWidth: 700, margin: '0 auto' }}>
                            <h1 className="syne fade-up" style={{ fontSize: 'clamp(36px,6vw,60px)', fontWeight: 800, lineHeight: 1.1, marginBottom: 20 }}>
                                Explore Your <span style={{ color: 'var(--brand)' }}>Career Path</span>
                            </h1>
                            <p className="fade-up-1" style={{ fontSize: 17, color: '#6b7280', lineHeight: 1.7 }}>
                                Discover where your passion fits and choose your next move
                            </p>
                        </section>

                        {/* Video */}
                        <section style={{ maxWidth: 900, margin: '0 auto', padding: '0 24px 56px' }}>
                            <div className="video-card fade-up-2" style={{ boxShadow: '0 20px 60px rgba(99,54,199,0.18)' }}>
                                <img
                                    src="Images/explore-1.png"
                                    alt="Programming vs Networking vs Communications"
                                    style={{ width: '100%', height: '100%', objectFit: 'cover', opacity: 0.7, position: 'absolute', inset: 0 }}
                                    onError={e => { e.target.style.display = 'none' }}
                                />
                                <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 16 }}>
                                    <div className="play-btn">
                                        <svg width="28" height="28" viewBox="0 0 24 24" fill="#fff" style={{ marginLeft: 4 }}>
                                            <path d="M8 5v14l11-7z" />
                                        </svg>
                                    </div>
                                </div>
                                {/* Tags */}
                                <div style={{ position: 'absolute', bottom: 20, left: 20, display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                                    {[['💻', 'Programming'], ['🌐', 'Networking'], ['📡', 'Telecom']].map(([ic, label]) => (
                                        <span key={label} className="tag-pill">{ic} {label}</span>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* CTA */}
                        <section style={{ textAlign: 'center', padding: '0 24px 32px' }}>
                            <a href="quiz.html" className="btn-primary">Start the Quiz</a>
                            <p style={{ color: '#9ca3af', fontSize: 12, fontWeight: 600, marginTop: 12, marginBottom: 20 }}>Takes less than 2 minutes</p>
                            <a href="career-path.html" style={{ color: 'var(--brand)', fontWeight: 600, fontSize: 15, textDecoration: 'underline', textUnderlineOffset: 3 }}>Know your path? Jump straight in</a>
                        </section>

                        {/* Category Cards */}
                        <section style={{ maxWidth: 1100, margin: '0 auto', padding: '32px 24px 80px' }}>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(240px,1fr))', gap: 20 }}>
                                {CATEGORIES.map((c, i) => (
                                    <a key={i} href={c.href} className="card" style={{ display: 'block' }}>
                                        <div className="card-icon" style={{ background: c.color, color: c.iconColor, fontSize: 22 }}>
                                            {c.icon}
                                        </div>
                                        <h3 className="syne" style={{ fontSize: 18, fontWeight: 700, marginBottom: 6 }}>{c.title}</h3>
                                        <p style={{ color: '#9ca3af', fontSize: 13 }}>{c.sub}</p>
                                    </a>
                                ))}
                            </div>
                        </section>
                    </main>

                    <footer style={{ background: '#fff', borderTop: '1px solid #f0eefe', padding: '28px 24px' }}>
                        <div style={{ maxWidth: 1200, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 }}>
                            <span className="syne" style={{ fontSize: 18, fontWeight: 800, color: '#1a1033' }}>Careery</span>
                            <span style={{ fontSize: 13, color: '#9ca3af' }}>© 2026 Careery | All rights reserved.</span>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
